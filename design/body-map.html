<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ZiffyHealth — Anatomical Body Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="../design-system/tokens.css" />
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: var(--font-body);
    color: var(--text);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding: 40px 24px;
    display: flex;
    justify-content: center;
  }

  /* ---------------- Card shell ---------------- */
  .bodymap-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 0 1px 2px rgba(10,52,0,.04), 0 12px 32px -12px rgba(10,52,0,.12);
    padding: 28px 32px 32px;
    max-width: 640px;
    width: 100%;
  }
  .bodymap-head { margin-bottom: 4px; }
  .bodymap-eyebrow {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--primary);
    font-weight: 500;
    margin: 0 0 6px;
  }
  .bodymap-title {
    font-family: var(--font-display);
    font-size: 24px;
    line-height: 1.15;
    font-weight: 600;
    color: var(--text-strong);
    margin: 0 0 4px;
    letter-spacing: -.01em;
  }
  .bodymap-sub {
    font-size: 13.5px;
    color: var(--text-muted);
    margin: 0 0 18px;
    max-width: 46ch;
  }

  /* ---------------- Stage ---------------- */
  .bodymap-stage {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
  }
  .bodymap-svg {
    width: 100%;
    max-width: 360px;
    height: auto;
    display: block;
    overflow: visible;
  }

  /* Silhouette */
  .silhouette-fill { fill: url(#bodyFill); }
  .silhouette-edge { fill: none; stroke: var(--green-300); stroke-width: 1.1; opacity: .55; }
  .body-centerline { stroke: var(--green-300); stroke-width: 1; opacity: .22; stroke-dasharray: 2 5; fill: none; }

  /* ---------------- Organs ---------------- */
  .organ { cursor: pointer; outline: none; }
  .organ .organ-glyph {
    transition: filter .22s ease, opacity .22s ease;
  }
  /* Each organ tinted to its zone via CSS color → currentColor in glyph paths */
  .organ[data-zone="normal"]      { color: var(--zone-normal); }
  .organ[data-zone="borderline"]  { color: var(--zone-borderline); }
  .organ[data-zone="alert"]       { color: var(--zone-alert); }
  .organ[data-zone="critical"]    { color: var(--zone-critical); }

  .organ .organ-glyph { opacity: .92; }
  .organ:hover .organ-glyph,
  .organ:focus-visible .organ-glyph,
  .organ.is-active .organ-glyph {
    opacity: 1;
    filter: drop-shadow(0 0 7px currentColor) drop-shadow(0 1px 3px rgba(0,0,0,.18));
  }

  /* Soft halo behind an active organ */
  .organ .organ-halo {
    fill: currentColor;
    opacity: 0;
    transition: opacity .22s ease, transform .22s ease;
    transform-box: fill-box;
    transform-origin: center;
    transform: scale(.6);
  }
  .organ:hover .organ-halo,
  .organ:focus-visible .organ-halo,
  .organ.is-active .organ-halo { opacity: .15; transform: scale(1); }

  /* Status dot (pulsing) */
  .status-dot { fill: currentColor; }
  .status-dot-ring {
    fill: none;
    stroke: currentColor;
    stroke-width: 1.4;
    transform-box: fill-box;
    transform-origin: center;
    animation: dotPulse 2.4s ease-out infinite;
  }
  @keyframes dotPulse {
    0%   { transform: scale(.8); opacity: .65; }
    70%  { transform: scale(2.4); opacity: 0; }
    100% { transform: scale(2.4); opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .status-dot-ring { animation: none; opacity: .4; }
  }

  /* Thyroid node (hand-drawn, no icon) */
  .thyroid-node { fill: currentColor; opacity: .92; }

  /* Spine / bone marker */
  .spine-rail { fill: none; stroke: currentColor; stroke-width: 3; stroke-linecap: round; opacity: .85; }
  .spine-rung { fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; opacity: .7; }

  /* Side connector lines for the off-body markers (bone, blood) */
  .marker-leader { stroke: var(--border-strong); stroke-width: 1; stroke-dasharray: 2 3; fill: none; opacity: .8; }

  /* ---------------- Tooltip ---------------- */
  .tip {
    position: absolute;
    z-index: 20;
    min-width: 188px;
    max-width: 250px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 8px 28px -8px rgba(10,52,0,.28), 0 2px 6px rgba(10,52,0,.08);
    padding: 12px 13px 13px;
    opacity: 0;
    transform: translateY(4px);
    pointer-events: none;
    transition: opacity .16s ease, transform .16s ease;
  }
  .tip.is-open { opacity: 1; transform: translateY(0); }
  .tip::after {
    content: "";
    position: absolute;
    left: var(--arrow-x, 50%);
    bottom: -7px;
    width: 12px; height: 12px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    transform: translateX(-50%) rotate(45deg);
  }
  .tip-head { display: flex; align-items: center; gap: 8px; margin-bottom: 3px; }
  .tip-title {
    font-family: var(--font-display);
    font-weight: 600;
    font-size: 14px;
    color: var(--text-strong);
    margin: 0;
    flex: 1;
    letter-spacing: -.005em;
  }
  .tip-sub {
    font-size: 11px;
    color: var(--text-muted);
    margin: 0 0 9px;
    font-family: var(--font-mono);
    letter-spacing: .03em;
    text-transform: uppercase;
  }
  .pill {
    display: inline-flex;
    align-items: center;
    font-family: var(--font-mono);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .04em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
  }
  .pill[data-zone="normal"]     { background: var(--zone-normal-bg);     color: var(--zone-normal-text); }
  .pill[data-zone="borderline"] { background: var(--zone-borderline-bg); color: var(--zone-borderline-text); }
  .pill[data-zone="alert"]      { background: var(--zone-alert-bg);      color: var(--zone-alert-text); }
  .pill[data-zone="critical"]   { background: var(--zone-critical-bg);   color: var(--zone-critical-text); }

  .tip-bio { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: 7px; }
  .tip-bio li { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .bio-name { font-size: 12px; color: var(--text); display: inline-flex; align-items: baseline; }
  .bio-val {
    font-family: var(--font-mono);
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text-strong);
    white-space: nowrap;
  }
  .bio-dot {
    width: 7px; height: 7px; border-radius: 50%;
    display: inline-block; margin-right: 6px; flex: none;
    position: relative; top: 1px;
  }
  .bio-dot[data-zone="normal"]     { background: var(--zone-normal-solid); }
  .bio-dot[data-zone="borderline"] { background: var(--zone-borderline-solid); }
  .bio-dot[data-zone="alert"]      { background: var(--zone-alert-solid); }
  .bio-dot[data-zone="critical"]   { background: var(--zone-critical-solid); }

  /* ---------------- Legend ---------------- */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px 22px;
    margin-top: 22px;
    padding-top: 18px;
    border-top: 1px solid var(--divider);
    justify-content: center;
  }
  .legend-item { display: inline-flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text); }
  .legend-swatch { width: 11px; height: 11px; border-radius: 50%; flex: none; }
  .legend-item[data-zone="normal"]     .legend-swatch { background: var(--zone-normal-solid); }
  .legend-item[data-zone="borderline"] .legend-swatch { background: var(--zone-borderline-solid); }
  .legend-item[data-zone="alert"]      .legend-swatch { background: var(--zone-alert-solid); }
  .legend-item[data-zone="critical"]   .legend-swatch { background: var(--zone-critical-solid); }
  .legend-item b { font-weight: 600; color: var(--text-strong); }

  /* Caption row under stage */
  .bodymap-foot {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 4px;
    font-size: 11.5px;
    color: var(--text-subtle);
    font-family: var(--font-mono);
    letter-spacing: .02em;
  }
</style>
</head>
<body>

      <h1 class="bodymap-title">Anatomical Body Map</h1>

const SVGNS = "http://www.w3.org/2000/svg";
const organsLayer = document.getElementById("organs");

function svgEl(tag, attrs = {}) {
  const n = document.createElementNS(SVGNS, tag);
  for (const k in attrs) n.setAttribute(k, attrs[k]);
  return n;
}

/* build glyph from path descriptors (no innerHTML) */
function glyphPaths(name) {
  const g = svgEl("g");
  for (const p of GLYPH[name]) {
    const attrs = { d: p.d, fill: "currentColor" };
    if (p.fr) { attrs["fill-rule"] = p.fr; attrs["clip-rule"] = p.fr; }
    g.appendChild(svgEl("path", attrs));
  }
  return g;
}

/* status dot = white keyline + solid dot + pulsing ring */
function statusDot(cx, cy) {
  const g = svgEl("g", { class: "status-dot-group" });
  g.appendChild(svgEl("circle", { cx, cy, r: 3.4, fill: "none", stroke: "var(--surface)", "stroke-width": 1.2 }));
  g.appendChild(svgEl("circle", { class: "status-dot-ring", cx, cy, r: 3.2 }));
  g.appendChild(svgEl("circle", { class: "status-dot", cx, cy, r: 2.4 }));
  return g;
}

function baseGroup(o, label) {
  const g = svgEl("g", { class: "organ", tabindex: "0", role: "button" });
  g.dataset.system = o.system;
  g.dataset.zone = o.zone;
  g.dataset.id = o.id;
  g.setAttribute("aria-label", label);
  return g;
}

/* Build an icon-based organ group */
function buildOrgan(o) {
  const g = baseGroup(o, o.system + " — zone " + o.zone);
  const cx = o.x + 24 * o.s, cy = o.y + 24 * o.s;
  g.appendChild(svgEl("circle", { class: "organ-halo", cx, cy, r: 22 * o.s }));
  const glyph = glyphPaths(o.glyph);
  glyph.setAttribute("class", "organ-glyph");
  glyph.setAttribute("transform", `translate(${o.x} ${o.y}) scale(${o.s})`);
  g.appendChild(glyph);
  g.appendChild(statusDot(o.dot[0], o.dot[1]));
  return g;
}

/* Thyroid node (butterfly: two lobes + isthmus), sits low on the neck */
function buildThyroid() {
  const g = baseGroup(THYROID, "Thyroid — zone normal");
  g.appendChild(svgEl("circle", { class: "organ-halo", cx: 160, cy: 83, r: 12 }));
  const node = svgEl("g", { class: "organ-glyph" });
  node.appendChild(svgEl("path", { class: "thyroid-node", d:
    "M160 80 C157.5 77 152.5 77 151 80.5 C149.5 84 151 88.5 154.5 89.5 C157.5 90.3 160 88 160 84.5 C160 88 162.5 90.3 165.5 89.5 C169 88.5 170.5 84 169 80.5 C167.5 77 162.5 77 160 80 Z" }));
  g.appendChild(node);
  g.appendChild(statusDot(THYROID.dot[0], THYROID.dot[1]));
  return g;
}

/* Spine / bone rail down the viewer-right side, with a leader to the trunk */
function buildBone() {
  const g = baseGroup(BONE, "Bone health — zone borderline");
  g.appendChild(svgEl("rect", { class: "organ-halo", x: 248, y: 182, width: 22, height: 92, rx: 11 }));
  const rail = svgEl("g", { class: "organ-glyph" });
  rail.appendChild(svgEl("path", { class: "marker-leader", d: "M205 226 L253 226" }));
  rail.appendChild(svgEl("path", { class: "spine-rail", d: "M259 190 L259 268" }));
  for (let yy = 196; yy <= 264; yy += 11) {
    rail.appendChild(svgEl("path", { class: "spine-rung", d: `M254 ${yy} L264 ${yy}` }));
  }
  g.appendChild(rail);
  g.appendChild(statusDot(BONE.dot[0], BONE.dot[1]));
  return g;
}

/* Blood marker — clustered RBC discs on the viewer-left flank */
function buildBlood() {
  const g = baseGroup(BLOOD, "Blood — zone normal");
  g.appendChild(svgEl("circle", { class: "organ-halo", cx: 56, cy: 232, r: 16 }));
  const blood = svgEl("g", { class: "organ-glyph" });
  blood.appendChild(svgEl("path", { class: "marker-leader", d: "M114 226 L72 226" }));
  const cells = [ [54, 218, 7], [64, 228, 6], [50, 234, 5.5] ];
  for (const [cx, cy, r] of cells) {
    blood.appendChild(svgEl("circle", { cx, cy, r, fill: "currentColor", opacity: ".9" }));
    blood.appendChild(svgEl("circle", { cx, cy, r: r * 0.42, fill: "var(--surface)", opacity: ".85" }));
  }
  g.appendChild(blood);
  g.appendChild(statusDot(BLOOD.dot[0], BLOOD.dot[1]));
  return g;
}

/* ---- assemble (render order: side markers + deep organs first, heart last on top) ---- */
const byId = Object.fromEntries(ORGANS.map(o => [o.id, o]));
const DRAW_ORDER = ["lung", "liver", "stomach", "pancreas", "kidneys", "intestine", "heart"];

organsLayer.appendChild(buildBone());
organsLayer.appendChild(buildBlood());
DRAW_ORDER.forEach(id => organsLayer.appendChild(buildOrgan(byId[id])));
organsLayer.appendChild(buildThyroid());

/* ============================================================
   Tooltip (built with safe DOM methods — no innerHTML)
   ============================================================ */
const ZONE_LABEL = { normal: "Normal", borderline: "Borderline", alert: "Alert", critical: "Critical" };
const ALLTIPS = {};
ORGANS.forEach(o => ALLTIPS[o.id] = o);
[THYROID, BONE, BLOOD].forEach(o => ALLTIPS[o.id] = o);

const tip = document.getElementById("tip");
const stage = document.getElementById("stage");
const svg = document.getElementById("bodymap");

function elNS(tag, cls, text) {
  const n = document.createElement(tag);
  if (cls) n.className = cls;
  if (text != null) n.textContent = text;
  return n;
}

function renderTip(o) {
  tip.replaceChildren();
  const head = elNS("div", "tip-head");
  head.appendChild(elNS("p", "tip-title", o.system));
  const pill = elNS("span", "pill", ZONE_LABEL[o.zone]);
  pill.dataset.zone = o.zone;
  head.appendChild(pill);
  tip.appendChild(head);

  tip.appendChild(elNS("div", "tip-sub", o.tip.sub));

  const ul = elNS("ul", "tip-bio");
  o.tip.bio.forEach(([name, val, z]) => {
    const li = document.createElement("li");
    const nameSpan = elNS("span", "bio-name");
    const dot = elNS("span", "bio-dot");
    dot.dataset.zone = z;
    nameSpan.appendChild(dot);
    nameSpan.appendChild(document.createTextNode(name));
    li.appendChild(nameSpan);
    li.appendChild(elNS("span", "bio-val", val));
    ul.appendChild(li);
  });
  tip.appendChild(ul);
}

/* Position tip above the organ's status dot, clamped to the stage */
function positionTip(o) {
  const pt = svg.createSVGPoint();
  pt.x = o.dot[0]; pt.y = o.dot[1];
  const sp = pt.matrixTransform(svg.getScreenCTM());
  const stageRect = stage.getBoundingClientRect();
  const px = sp.x - stageRect.left;
  const py = sp.y - stageRect.top;

  tip.classList.add("is-open"); // make measurable
  const tw = tip.offsetWidth, th = tip.offsetHeight;
  const pad = 6;
  let left = px - tw / 2;
  let top = py - th - 14;
  left = Math.max(pad, Math.min(left, stageRect.width - tw - pad));
  if (top < pad) top = py + 16; // flip below if no room above
  tip.style.left = left + "px";
  tip.style.top = top + "px";
  const arrow = Math.max(14, Math.min(tw - 14, px - left));
  tip.style.setProperty("--arrow-x", arrow + "px");
}

let activeEl = null;
function openTip(groupEl) {
  const o = ALLTIPS[groupEl.dataset.id];
  if (!o) return;
  if (activeEl && activeEl !== groupEl) activeEl.classList.remove("is-active");
  activeEl = groupEl;
  groupEl.classList.add("is-active");
  renderTip(o);
  positionTip(o);
}
function closeTip() {
  tip.classList.remove("is-open");
  if (activeEl) activeEl.classList.remove("is-active");
  activeEl = null;
}

document.querySelectorAll(".organ").forEach(g => {
  g.addEventListener("mouseenter", () => openTip(g));
  g.addEventListener("mouseleave", () => closeTip());
  g.addEventListener("focus", () => openTip(g));
  g.addEventListener("blur", () => closeTip());
  g.addEventListener("click", (e) => { e.stopPropagation(); openTip(g); });
  g.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); openTip(g); }
    if (e.key === "Escape") { closeTip(); g.blur(); }
  });
});
document.addEventListener("click", () => closeTip());

/* ---- Open one tooltip by default (Heart — the standout) for screenshots ---- */
window.addEventListener("load", () => {
  const heartEl = organsLayer.querySelector('.organ[data-id="heart"]');
  if (heartEl) requestAnimationFrame(() => openTip(heartEl));
});
